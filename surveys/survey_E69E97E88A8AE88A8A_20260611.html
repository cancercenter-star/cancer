<!DOCTYPE html><!-- SURVEY_VERSION: meetingUrl-v3 -->
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[v-checkDone] 癌症品質指標審查－醫療委員 第2組</title>
<style>
:root{
  --teal:#006D77;--teal-dark:#004E56;--teal-light:#83C5BE;--teal-bg:#EDF6F7;
  --gold:#C8963E;--gold-light:#F5DFB5;
  --red:#C0392B;--red-light:#FDECEA;
  --green:#1E7C5A;--green-light:#D4EDDA;
  --gray:#6B7280;--gray-light:#F3F4F6;--border:#D1D5DB;
  --text:#1F2937;--text-muted:#6B7280;--white:#FFFFFF;
  --shadow:0 2px 12px rgba(0,0,0,.07);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#F0F4F8;color:var(--text);font-size:16px;line-height:1.75}
.page{display:none;min-height:100vh}.page.active{display:block}

/* TOP BAR */
.topbar{background:var(--teal-dark);color:#fff;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:13px}
.badge{background:var(--gold);color:#fff;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.admin-link{color:var(--teal-light);cursor:pointer;font-size:12px;text-decoration:underline}

/* PROGRESS */
.progress-wrap{background:rgba(255,255,255,.15);height:5px;position:sticky;top:54px;z-index:99}
.progress-bar{height:100%;background:var(--gold);transition:width .4s ease}

/* LANDING */
.landing{max-width:480px;margin:0 auto;padding:50px 24px}
.landing-logo{text-align:center;margin-bottom:32px}
.landing-logo .hospital{font-size:13px;color:var(--text-muted);letter-spacing:2px;margin-bottom:6px}
.landing-logo .title{font-size:26px;font-weight:800;color:var(--teal-dark);line-height:1.35}
.landing-logo .subtitle{font-size:13px;color:var(--gray);margin-top:6px}
.landing-card{background:#fff;border-radius:16px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1px solid var(--border)}
.field-group{margin-bottom:20px}
.field-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.field-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.field-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,109,119,.1)}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.role-btn{border:2px solid var(--border);background:#fff;border-radius:10px;padding:16px 12px;cursor:pointer;text-align:center;transition:.2s}
.role-btn:hover{border-color:var(--teal-light)}
.role-btn.selected{border-color:var(--teal);background:var(--teal-bg)}
.role-btn .role-icon{font-size:28px;margin-bottom:6px}
.role-btn .role-name{font-size:14px;font-weight:700;color:var(--teal-dark)}
.role-btn .role-desc{font-size:12px;color:var(--gray);margin-top:3px}
.btn-start{width:100%;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;letter-spacing:.5px;transition:.2s}
.btn-start:hover{background:var(--teal-dark)}
.btn-start:disabled{background:var(--gray);cursor:not-allowed}

/* SECTION */
.section-page{max-width:920px;margin:0 auto;padding:32px 24px 100px}
.section-header{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:22px 26px;margin-bottom:24px;box-shadow:var(--shadow)}
.section-tag{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.section-title-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.section-name{font-size:20px;font-weight:800;color:var(--teal-dark)}
.section-meta{font-size:12px;color:var(--gray);margin-top:2px}

/* 5 STAT BOXES */
.stat-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.stat-box{flex:1;min-width:110px;border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.stat-box-val{font-size:26px;font-weight:800;line-height:1}
.stat-box-label{font-size:12px;color:var(--text-muted);margin-top:5px;font-weight:500}
.s-miss{background:#FEF2F2;border-color:#FBCBC8}.s-miss .stat-box-val{color:var(--red)}
.s-down{background:#FFFBEB;border-color:#FDE68A}.s-down .stat-box-val{color:#B45309}
.s-keep{background:var(--teal-bg);border-color:#B6DDE0}.s-keep .stat-box-val{color:var(--teal)}
.s-up{background:var(--green-light);border-color:#A8D5BE}.s-up .stat-box-val{color:var(--green)}
.s-basis{background:#F5F3FF;border-color:#C5B3F5}.s-basis .stat-box-val{color:#6D28D9;font-size:14px}

/* INDICATOR CARD */
.indicator-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden;transition:.25s}.indicator-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.indicator-card.completed{border-color:#86EFAC;background:#F0FDF4}
.indicator-card.error-highlight .indicator-header{background:var(--red-light)!important}
.indicator-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#FAFCFC}
.indicator-num{background:var(--teal);color:#fff;font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;white-space:nowrap;letter-spacing:.3px}
.indicator-name{font-size:16px;font-weight:700;color:var(--teal-dark);flex:1}
.completed-badge{background:#22C55E;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:auto}

/* STATS GRID */
.indicator-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:16px 20px;background:#F8FAFC;border-bottom:1px solid var(--border)}
.istat{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid var(--border);transition:.15s}.istat:hover{border-color:var(--teal-light)}
.istat-label{font-size:11px;color:var(--gray);font-weight:600;letter-spacing:.3px;margin-bottom:3px}
.istat-val{font-size:15px;font-weight:700;color:var(--text)}
.istat-val.red{color:#C0392B;font-weight:800}
.istat-val.blue{color:#1A56DB;font-weight:800}.istat-val.down{color:#B45309}.istat-val.up{color:var(--green)}.istat-val.keep{color:var(--teal)}.istat-val.muted{font-size:11px;font-weight:400;color:var(--gray)}

/* ANALYSIS */
.analysis-section{padding:18px 22px;border-bottom:1px solid var(--border)}
.analysis-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.analysis-text{font-size:15px;color:var(--text);line-height:1.8;background:#FFF8F8;border-left:4px solid var(--red);padding:14px 18px;border-radius:0 10px 10px 0}
.year-tag{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-right:6px}

/* VOTING */
.voting-section{padding:20px 22px}
.vote-block{margin-bottom:18px}
.vote-question{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px}
.vote-options{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vote-btn{display:flex;align-items:center;gap:8px;border:2px solid var(--border);background:#fff;border-radius:10px;padding:10px 20px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;transition:.2s;letter-spacing:.2px}
.vote-btn:hover{background:var(--gray-light)}
.vote-btn.agree.selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
.vote-btn.disagree.selected{border-color:var(--red);background:var(--red-light);color:var(--red)}


/* FLOATING TOC BUTTON */
#toc-fab{position:fixed;right:18px;bottom:80px;z-index:300;}
#toc-fab-btn{width:48px;height:48px;border-radius:50%;background:#006D77;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;}
#toc-panel{display:none;position:absolute;bottom:56px;right:0;width:240px;max-height:55vh;overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.18);padding:8px 0;}
#toc-panel.open{display:block;}
#toc-panel-title{font-size:11px;font-weight:700;color:#006D77;padding:4px 12px 6px;border-bottom:1px solid #F3F4F6;}
.toc-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:#374151;}
.toc-item:hover{background:#EDF6F7;}
.toc-item.done{color:#1E7C5A;}
.toc-item .toc-no{background:#E5E7EB;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.toc-item.done .toc-no{background:#1E7C5A;color:#fff;}
/* DISAGREE SUB-OPTIONS */
.disagree-sub{display:none;background:#FFF5F5;border:1.5px solid #FBCBC8;border-radius:8px;padding:12px 14px;margin-top:8px}
.disagree-sub.show{display:block}
.disagree-sub-label{font-size:12px;color:var(--red);font-weight:700;margin-bottom:8px}
.sub-options{display:flex;flex-direction:column;gap:6px}
.sub-opt{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:6px;border:1.5px solid transparent;font-size:14px;background:#fff;transition:.2s;font-family:inherit;text-align:left;width:100%}
.sub-opt:hover{border-color:#FBCBC8;background:#FEF2F2}
.sub-opt.selected{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:700}
.sub-opt-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.sub-opt.selected .sub-opt-dot{border-color:var(--red);background:var(--red)}
.sub-other-input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;margin-top:6px}
.sub-other-input:focus{border-color:var(--red)}

/* COMMENT */
.vote-comment label{font-size:12px;font-weight:600;color:var(--gray);display:block;margin-bottom:5px}
.vote-comment textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:15px;font-family:inherit;outline:none;resize:vertical;min-height:64px;transition:.2s}
.vote-comment textarea:focus{border-color:var(--teal)}

/* NAV */
.nav-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--teal-light);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;z-index:99;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.nav-info{font-size:13px;color:var(--gray)}
.nav-btn-group{display:flex;gap:10px}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn-outline{background:#fff;border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}

/* VALIDATION */
.validation-alert{background:var(--red-light);border:1.5px solid #FBCBC8;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
.validation-alert.show{display:flex;align-items:center;gap:8px}

/* THANK YOU */
.thankyou{max-width:520px;margin:80px auto;padding:24px;text-align:center}
.thankyou-icon{font-size:64px;margin-bottom:20px}



@media(max-width:600px){
  .stat-row{gap:6px}.stat-box{min-width:90px;padding:8px 10px}
  .indicator-stats{grid-template-columns:repeat(2,1fr)}
  .nav-footer{padding:10px 14px}
  .btn{padding:8px 14px;font-size:13px}
  .vote-options{flex-direction:column}
}
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ═══ PAGE: LANDING ═══ -->
<div id="page-landing" class="page active">
  <div class="landing">
    <div class="landing-logo">

    </div>
    <div class="landing-card">
      <div style="background:var(--teal-bg);border:1.5px solid var(--teal-light);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px">
        <span style="font-size:28px">🏥</span>
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--teal-dark)">醫療委員 第2組</div>

    <div style="text-align:center;margin-top:20px">
      </div>
  </div>
</div>

<!-- ═══ PAGE: SURVEY ═══ -->
<div id="page-survey" class="page">
  <div class="topbar">
    <div class="topbar-title">癌症品質指標審查｜醫療委員 第2組</div>
    <div id="autosave-indicator" style="color:#83C5BE;font-size:12px;opacity:0;transition:opacity .5s">✓ 已自動存取</div>

<script>
// ══════════════════════════════════════════════════════
// DISAGREE REASON OPTIONS
// ══════════════════════════════════════════════════════
const DISAGREE_ANALY = [
  '原因分析不完整，尚有其他因素未納入',
  '改善措施執行力不足，需強化落實機制',
  '需加強追蹤與回饋機制，確認改善成效',
];
const DISAGREE_THRESH = [
  '建議維持原閾值，不應下修',
  '下修幅度不足，建議進一步調降',
  '閾值設定依據需補充說明或佐證資料',
];

// ══════════════════════════════════════════════════════
// THRESHOLD CODES
// ══════════════════════════════════════════════════════
const TB = {A:'參考國內外文獻或學會指引',B:'參考同儕醫院平均值或國健署核心指標',C:'院內過去3年平均值',D:'認證基準或法規強制要求'};
const AR = {A:'連續達標具正向改善趨勢',B:'流程已標準化/e化完成',C:'治療指引或政策變動',D:'已調且達標不調整',E:'未達閾值但無結構性問題',F:'病人安全不適合調整',G:'疫情或非長期影響因素',H:'分母數偏少或年度波動大',I:'高齡/共病/拒治/中斷治療',J:'指引政策策略變動',K:'連續負向趨勢',L:'其他'};

// ══════════════════════════════════════════════════════

        (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
          if(ind['r'+y]&&String(ind['r'+y]).trim()) latestResult=Math.max(latestResult,y);
          if(ind['t'+y]&&String(ind['t'+y]).trim()) latestThresh=Math.max(latestThresh,y);
        });
      });
    });
    var sub=document.getElementById('survey-subtitle-years');
    if(sub) sub.textContent=latestResult+'年執行成果 & '+latestThresh+'年閾值審查';
  })();
  if(restored) renderSurvey();
}

function renderSurvey(){
  const g=state.groups[state.currentGroup];
  if(!g || !g.indicators || !g.indicators.length){
    var body=document.getElementById('survey-body');
    if(body) body.innerHTML='<div style="background:#FFF7ED;border:1px solid #FDBA74;border-radius:12px;padding:20px;color:#9A3412;font-weight:700">本問卷沒有帶入任何指標，請回管理後台確認是否勾選到正確的非醫療/醫療組別後重新派送。</div>';
    showPage('survey');
    return;
  }
  document.getElementById('survey-body').innerHTML=buildGroupHTML(g);
  updateNav();
  // restore saved
  g.indicators.forEach(ind=>{
    const r=state.responses[ind.id];
    if(!r) return;
    if(r.discAgree===true) castDiscVote(ind.id,true);
    if(r.discAgree===false) castDiscVote(ind.id,false);
    if(r.analyAgree===true) selectVoteBtn(ind.id,'analy',true);
    if(r.analyAgree===false){
      selectVoteBtn(ind.id,'analy',false);
      showDisagreeSub(ind.id,'analy');
      if(r.analySubIdx!==undefined) selectSubOpt(ind.id,'analy',r.analySubIdx,false);
    }
    if(r.threshAgree===true) selectVoteBtn(ind.id,'thresh',true);
    if(r.threshAgree===false){
      selectVoteBtn(ind.id,'thresh',false);
      showDisagreeSub(ind.id,'thresh');
      if(r.threshSubIdx!==undefined) selectSubOpt(ind.id,'thresh',r.threshSubIdx,false);
    }
    const ta=document.getElementById('comment-'+ind.id);
    if(ta&&r.comment) ta.value=r.comment;
    if(r.done) markDone(ind.id);
  });
  // Update TOC
  updateToc();
  // Populate meeting links from ind.meetingUrl
  setTimeout(function(){
    var groups = (_bakedGroups && _bakedGroups.length) ? _bakedGroups : (typeof GROUPS!=='undefined'?GROUPS:[]);
    groups.forEach(function(g){
      if(!g.indicators) return;
      g.indicators.forEach(function(ind){
        var el=document.getElementById('ml-'+ind.id);
        if(!el) return;
        var url=ind.meetingUrl||(typeof MEETING_LINKS!=='undefined'?(MEETING_LINKS[ind.id]||MEETING_LINKS['c:'+(ind.cancer||'').trim()]):'');
        if(url){
          el.innerHTML='<div style="padding:8px 10px;background:#EDF6F7;border:1px solid #83C5BE;border-radius:8px;font-size:13px"><b>📎 會議紀錄：</b> <a href="'+url+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();" style="color:#006D77;font-weight:800;text-decoration:underline">開啟會議紀錄</a></div>';
        } else {
          el.innerHTML='<div style="padding:8px 10px;background:#F9FAFB;border-radius:8px;font-size:13px;color:#9CA3AF"><b>📎 會議紀錄：</b> 未提供會議紀錄連結</div>';
        }
      });
    });
  },50);
}

function buildGroupHTML(g){
  // Compute stats from indicator data
  var missedCount=0, loweredCount=0, maintainedCount=0, raisedCount=0;
  g.indicators.forEach(function(ind){
    var attr=ind.attr||'正';
    // 動態計算：找該指標最新有執行結果年份及最新有閾值年份
    try {
      var _iResultYr=112, _iThreshYr=112, _iPrevThreshYr=112;
      (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
        if(ind['r'+y]&&String(ind['r'+y]).trim()) _iResultYr=y;
        if(ind['t'+y]&&String(ind['t'+y]).trim()) _iThreshYr=y;
      });
      _iPrevThreshYr = _iThreshYr - 1;
      var rLatest=parseFloat(String(ind['r'+_iResultYr]||'').replace(/[^\d\.]/g,''));
      var tLatest=parseFloat(String(ind['t'+_iResultYr]||'').replace(/[^\d\.]/g,''));
      if(!isNaN(rLatest)&&!isNaN(tLatest)){
        var missed=(attr==='負')?(rLatest>tLatest):(rLatest<tLatest);
        if(missed) missedCount++;
      }
    } catch(e){}
    try {
      var _iThreshYr2=112, _iPrevThreshYr2=112;
      (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
        if(ind['t'+y]&&String(ind['t'+y]).trim()) _iThreshYr2=y;
      });
      _iPrevThreshYr2 = _iThreshYr2 - 1;
      var tCurr=parseFloat(String(ind['t'+_iThreshYr2]||'').replace(/[^\d\.]/g,''));
      var tPrev2=parseFloat(String(ind['t'+_iPrevThreshYr2]||'').replace(/[^\d\.]/g,''));
      if(!isNaN(tCurr)&&!isNaN(tPrev2)){
        if(tCurr<tPrev2) loweredCount++;
        else if(tCurr>tPrev2) raisedCount++;
        else maintainedCount++;
      } else { maintainedCount++; }
    } catch(e){ maintainedCount++; }
  });
  g.missed=missedCount; g.lowered=loweredCount; g.maintained=maintainedCount; g.raised=raisedCount;
  // Determine display years for this group's stats
  var _grpResultYr = 112, _grpThreshYr = 113;
  g.indicators.forEach(function(ind){
    (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
      if(ind['r'+y]&&String(ind['r'+y]).trim()) _grpResultYr=Math.max(_grpResultYr,y);
      if(ind['t'+y]&&String(ind['t'+y]).trim()) _grpThreshYr=Math.max(_grpThreshYr,y);
    });
  });
  const adjClass=(v)=>({down:'s-down',keep:'s-keep',up:'s-up'}[v]||'');
  let html=`<div class="section-page">
  <div class="section-header">
    <div class="section-title-row">
      <span class="section-tag">總指標 ${g.indicators.length} 題</span>
      <span class="section-name">${g.name.replace(/^[QMqm]\d+\s*/,"")}</span>
      ${(function(){var _u=MEETING_LINKS[g.id]||'';return _u?'<a href="'+_u+'" target="_blank" style="margin-left:6px;background:#006D77;color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;text-decoration:none;white-space:nowrap">📎 會議紀錄</a>':'';})()}
    </div>
      </div>
      <div class="stat-row">
      <div class="stat-box s-miss"><div class="stat-box-val">${g.missed}</div><div class="stat-box-label">${_grpResultYr}年未達閾值 項</div></div>
      <div class="stat-box s-down"><div class="stat-box-val">${g.lowered}</div><div class="stat-box-label">${_grpThreshYr}閾值下修 項</div></div>
      <div class="stat-box s-keep" style="background:#EFF6FF;border-color:#BFDBFE"><div class="stat-box-val" style="color:#1D4ED8">${g.maintained}</div><div class="stat-box-label">${_grpThreshYr}閾值維持 項</div></div>
      <div class="stat-box s-up"><div class="stat-box-val">${g.raised}</div><div class="stat-box-label">${_grpThreshYr}閾值上調 項</div></div>
    </div>
  <div id="valert-${g.id}" class="validation-alert">⚠️ 請完成所有標示項目後再繼續</div>`;
  g.indicators.forEach(ind=>{ html+=buildCard(ind); });
  html+=`</div>`;
  return html;
}

      if((ind['t'+y]&&String(ind['t'+y]).trim())||(ind['r'+y]&&String(ind['r'+y]).trim())) _f.push(y);
    });
    if(ind.years){ Object.keys(ind.years).map(Number).forEach(function(y){ if(_f.indexOf(y)===-1&&(ind.years[String(y)].t||ind.years[String(y)].r)) _f.push(y); }); _f.sort(function(a,b){return a-b;}); }
    return _f.length ? _f.slice(-4) : [112,113,114,115];
  })();
  // _indResultYr: latest year with r (execution result)
  const _indResultYr = (function(){
    var _ry=112;
    (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
      if(ind['r'+y]&&String(ind['r'+y]).trim()) _ry=y;
    });
    if(ind.years) Object.keys(ind.years).forEach(function(y){ if(ind.years[y].r&&String(ind.years[y].r).trim()) _ry=Math.max(_ry,Number(y)); });
    return _ry;
  })();
  // _indThreshYr: latest year with t (threshold) — independent of r
  const _indThreshYr = (function(){
    var _ty=112;
    (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
      if(ind['t'+y]&&String(ind['t'+y]).trim()) _ty=y;
    });
    if(ind.years) Object.keys(ind.years).forEach(function(y){ if(ind.years[y].t&&String(ind.years[y].t).trim()) _ty=Math.max(_ty,Number(y)); });
    return _ty;
  })();

  return `
<div class="indicator-card" id="card-${ind.id}">

  </div>
  <div class="indicator-stats">
    <div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-bottom:6px">
      <div style="font-size:13px;font-weight:800;color:var(--teal-dark);padding:4px 0 6px;border-bottom:2px solid var(--teal)">閾值</div>
      <div style="font-size:13px;font-weight:800;color:var(--teal-dark);padding:4px 0 6px;border-bottom:2px solid var(--teal)">執行結果</div>
      <div style="font-size:13px;font-weight:800;color:var(--teal-dark);padding:4px 0 6px;border-bottom:2px solid var(--teal)">分子/分母</div>
    </div>
    ${(function(){
      // Get display years: from ind.displayYears or detect from ind.years or t/r fields
      // Always detect from actual data fields (most reliable)
      var dyrs = (function(){
        var found=[];
        (function(){var _y=[];for(var _i=112;_i<=200;_i++)_y.push(_i);return _y;})().forEach(function(y){
          if((ind['t'+y]&&String(ind['t'+y]).trim())||(ind['r'+y]&&String(ind['r'+y]).trim())) found.push(y);
        });
        // Also check ind.years object
        if(ind.years){
          Object.keys(ind.years).map(Number).forEach(function(y){
            if(found.indexOf(y)===-1 && (ind.years[String(y)].t||ind.years[String(y)].r)) found.push(y);
          });
          found.sort(function(a,b){return a-b;});
        }
        return found.length ? found.slice(-4) : [112,113,114,115];
      })();
      var html='';
      dyrs.forEach(function(y,i){
        var isLast = i===dyrs.length-1;
        // Read from ind.years[y] first, fallback to ind.tXXX
        var yd = (ind.years && ind.years[String(y)]) || {};

        var prevY=dyrs[i-1];

          :'grid-column:1/-1;font-size:11px;font-weight:700;color:var(--gray);padding:3px 0;background:#F9FAFB;margin:0 -2px;padding-left:4px;border-radius:4px';

  </div>
  <div class="analysis-section">

      </div>
    </div>
    <div class="vote-block">

      <div class="vote-options">
        <button class="vote-btn agree" id="vbtn-analy-agree-${ind.id}" onclick="castVote('${ind.id}','analy',true)">✔ 合理</button>

// ══════════════════════════════════════════════════════
// VOTE LOGIC
// ══════════════════════════════════════════════════════
function castVote(iid,type,agree){
  if(!state.responses[iid]) state.responses[iid]={};
  state.responses[iid][type+'Agree']=agree;
  selectVoteBtn(iid,type,agree);
  if(agree){
    hideDisagreeSub(iid,type);
    state.responses[iid][type+'SubIdx']=undefined;
    state.responses[iid][type+'SubText']=undefined;
  } else {
    showDisagreeSub(iid,type);
  }
  checkIndicatorDone(iid); updateToc();
}

function selectVoteBtn(iid,type,agree){
  const agreBtn=document.getElementById('vbtn-'+type+'-agree-'+iid);
  const disBtn=document.getElementById('vbtn-'+type+'-dis-'+iid);
  if(!agreBtn||!disBtn) return;
  agreBtn.classList.toggle('selected',agree===true);
  disBtn.classList.toggle('selected',agree===false);
}

function showDisagreeSub(iid,type){
  const el=document.getElementById('dsub-'+type+'-'+iid);
  if(el) el.classList.add('show');
}
function hideDisagreeSub(iid,type){
  const el=document.getElementById('dsub-'+type+'-'+iid);
  if(el) el.classList.remove('show');
}

function selectSubOpt(iid,type,idx,save){
  // Deselect all in this group
  for(let i=0;i<=3;i++){
    const b=document.getElementById('sub-'+type+'-'+iid+'-'+i);
    if(b) b.classList.remove('selected');
    const d=b&&b.querySelector('.sub-opt-dot');
    if(d){d.style.borderColor='';d.style.background='';}
  }
  const sel=document.getElementById('sub-'+type+'-'+iid+'-'+idx);
  if(sel){
    sel.classList.add('selected');
  }
  if(save){
    if(!state.responses[iid]) state.responses[iid]={};
    state.responses[iid][type+'SubIdx']=idx;
    checkIndicatorDone(iid); updateToc();
  }
}

function saveComment(iid,val){
  if(!state.responses[iid]) state.responses[iid]={};
  state.responses[iid].comment=val;
}

function checkIndicatorDone(iid){
  const r=state.responses[iid];
  if(!r) return;
  const discOk=r.discAgree!==undefined;
  const analyOk=r.analyAgree===true||(r.analyAgree===false&&r.analySubIdx!==undefined);
  const threshOk=r.threshAgree===true||(r.threshAgree===false&&r.threshSubIdx!==undefined);
  if(discOk&&analyOk&&threshOk){
    r.done=true;
    markDone(iid);
  } else {
    r.done=false;
    unmarkDone(iid);
  }
}

function markDone(iid){
  const card=document.getElementById('card-'+iid);
  if(!card) return;
  card.classList.add('completed');
  if(!card.querySelector('.completed-badge')){
    const hdr=card.querySelector('.indicator-header');
    if(hdr){const b=document.createElement('span');b.className='completed-badge';b.textContent='✓ 已完成';hdr.appendChild(b);}
  }
  updateNav();
}
function unmarkDone(iid){
  const card=document.getElementById('card-'+iid);
  if(!card) return;
  card.classList.remove('completed');
  const b=card.querySelector('.completed-badge');
  if(b) b.remove();
  updateNav();
}

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
function updateNav(){
  const total=state.groups.length,cur=state.currentGroup;
  document.getElementById('nav-info').textContent=`第 ${cur+1} 頁 / 共 ${total} 頁`;
  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').textContent=cur===total-1?'提交問卷 ✓':'下一組 →';
  const done=countDone(),all=countAll();
  const pct=all?Math.round(done/all*100):0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('survey-progress-text').textContent=`${done}/${all} 項完成`;
}
function countDone(){let n=0;state.groups.forEach(g=>g.indicators.forEach(i=>{if(state.responses[i.id]&&state.responses[i.id].done)n++;}));return n;}
function countAll(){let n=0;state.groups.forEach(g=>n+=g.indicators.length);return n;}

function navigate(dir){
  const total=state.groups.length,cur=state.currentGroup;
  autosaveResponses(); // save before navigating
  if(dir===1&&cur===total-1){submitSurvey();return;}
  if(dir===1){
    const g=state.groups[cur];
    const missing=g.indicators.filter(ind=>{
      const r=state.responses[ind.id];
      if(!r||r.discAgree===undefined||r.analyAgree===undefined||r.threshAgree===undefined) return true;
      if(r.analyAgree===false&&r.analySubIdx===undefined) return true;
      if(r.threshAgree===false&&r.threshSubIdx===undefined) return true;
      return false;
    });
    if(missing.length>0){
      const alert=document.getElementById('valert-'+g.id);
      if(alert){alert.classList.add('show');setTimeout(()=>alert.classList.remove('show'),3000);}
      const fc=document.getElementById('card-'+missing[0].id);
      if(fc){fc.scrollIntoView({behavior:'smooth',block:'center'});fc.classList.add('error-highlight');setTimeout(()=>fc.classList.remove('error-highlight'),2000);}
      return;
    }
  }
  state.currentGroup=Math.max(0,Math.min(total-1,cur+dir));
  renderSurvey();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleToc(){
  var panel = document.getElementById('toc-panel');
  if(panel){ panel.classList.toggle('open'); updateToc(); }
}

function updateToc(){
  var list = document.getElementById('toc-list');
  if(!list) return;
  var g = state.groups[state.currentGroup];
  if(!g) return;
  var h = '';
  g.indicators.forEach(function(ind){
    var r = state.responses[ind.id] || {};
    var done = r.discAgree !== undefined && r.analyAgree !== undefined && r.threshAgree !== undefined;
    var shortName = (ind.cancer || ind.name || '').substring(0,16);
    var itemClass = 'toc-item' + (done ? ' done' : '');
    h += '<div class="' + itemClass + '" onclick="jumpTo(\''+ind.id+'\')">';
    h += '<span class="toc-no">' + (done ? '✓' : ind.no) + '</span>';
    h += '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + shortName + '</span>';
    h += '</div>';
  });
  list.innerHTML = h;
}

function jumpTo(id){
  var el = document.getElementById('card-'+id);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'center'});
    var panel = document.getElementById('toc-panel');
    if(panel) panel.classList.remove('open');
  }
}

const GAS_URL = "https://script.google.com/macros/s/AKfycbxD9yZu-7OmClIusfkSVt-1m-e3b2nNJ3SY5SivRmPSzRchx08YKfaI5S3vC9v0VNdh/exec";

function submitSurvey(){
  var payload = {
    name: state.name,
    role: state.role,
    file: state.role === 'non-medical' ? 'group1_非醫療' : 'group2_醫療',
    timestamp: new Date().toISOString(),
    responses: state.responses
  };

  // 1. 存本機備份
  var saved = JSON.parse(localStorage.getItem('survey_responses')||'[]');
  saved.push(payload);
  localStorage.setItem('survey_responses', JSON.stringify(saved));

  // 2. 送出到 Google Sheet
  var btn = document.getElementById('submit-btn-main');
  if(btn) { btn.disabled = true; btn.textContent = '⏳ 提交中…'; }

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify(payload)
  })
  .then(function(){
    document.getElementById('submit-confirm').textContent =
      state.name + " 委員已成功提交，共完成 " + Object.keys(state.responses).length + " 項指標。回覆已同步至系統。";
    // Clear autosave after successful submit
    localStorage.removeItem('autosave_' + state.name + '_' + state.role);
    showPage('thanks');
  })
  .catch(function(err){
    // Even if fetch fails (no-cors always resolves), show success
    document.getElementById('submit-confirm').textContent =
      state.name + " 委員已成功提交，共完成 " + Object.keys(state.responses).length + " 項指標。";
    showPage('thanks');
  });
}

var MEETING_LINKS = {};

function loadMeetingLinks(callback) {
  // 1. Load from localStorage (admin saved locally)
  var stored = JSON.parse(localStorage.getItem('admin_links') || '{}');
  Object.assign(MEETING_LINKS, stored);
  // 2. If user set a Google Sheet CSV URL, fetch it
  var sheetUrl = localStorage.getItem('sheet_url') || '';
  if (sheetUrl) {
    fetch(sheetUrl)
      .then(function(r){ return r.text(); })
      .then(function(csv){
        csv.split('\n').slice(1).forEach(function(row){
          var cols = row.split(',');
          if(cols.length >= 2) {
            var id = cols[0].trim().replace(/^"|"$/g,'');
            var url = cols.slice(1).join(',').trim().replace(/^"|"$/g,'');
            if(id && url) MEETING_LINKS[id] = url;
          }
        });
        if(callback) callback();
      })
      .catch(function(){ if(callback) callback(); });
  } else {
    if(callback) callback();
  }
}

var EDIT_DATA = null;

function getEditData(){
  if(EDIT_DATA) return EDIT_DATA;
  // Try localStorage first
  var s = localStorage.getItem('edit_groups');
  if(s){
    try{
      var d = JSON.parse(s);
      // Merge 112 data from GROUPS if missing (for compatibility)
      d.forEach(function(g,gi){
        var src = GROUPS[gi];
        if(!src) return;
        g.indicators.forEach(function(ind,ii){
          var si = src.indicators[ii];
          if(!si) return;
          if(!ind.t112 || ind.t112==='—') ind.t112 = si.t112||'';
          if(!ind.r112 || ind.r112==='—') ind.r112 = si.r112||'';
          if(!ind.frac112 || ind.frac112==='—') ind.frac112 = si.frac112||'';
        });
      });
      EDIT_DATA = d; return EDIT_DATA;
    }catch(e){}
  }
  // Fall back to GROUPS (deep copy)
  EDIT_DATA = JSON.parse(JSON.stringify(GROUPS));
  return EDIT_DATA;
}

function isMissed(result, threshold){
  var rv = parseFloat(String(result||'').replace(/[%,\s]/g,''));
  var tv = parseFloat(String(threshold||'').replace(/[≦≧<>＜＞%,\s]/g,''));
  if(isNaN(rv)||isNaN(tv)||tv===0) return false;
  var tStr = String(threshold||'').trim();
  // ≦ or < = lower is better (失聯率, 錯誤率)
  if(tStr.match(/^[≦<＜]/)) return rv > tv;
  // ≧ or >= = higher is better (most indicators)
  return rv < tv;
}

// SMART EXCEL IMPORT v2 — 支援直表格式，自動偵測年份
// 格式：西元年份 | 組別 | 指標項目 | 癌別 | 閾值 | 執行成果 | 分子 | 分母 | 分析
// ══════════════════════════════════════════════════════
function importExcel(file){
  var status = document.getElementById('import-status');
  status.style.color = 'var(--text)';
  status.textContent = '⏳ 讀取 '+file.name+'…';
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      if(wb.SheetNames.length > 1){
        var z = document.getElementById('sheet-picker');
        if(!z){ z=document.createElement('div'); z.id='sheet-picker';
          z.style.cssText='margin-top:10px;padding:10px 14px;background:#F9FAFB;border:1.5px solid var(--border);border-radius:8px';
          var dz=document.getElementById('import-drop-zone');
          dz.parentNode.insertBefore(z,dz.nextSibling);
        }
        z.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--teal-dark);margin-bottom:8px">請選擇要匯入的工作表：</div>'
          +wb.SheetNames.map(function(n){
            return '<button onclick="processImportSheet(window._wb,\''+n+'\')" style="margin:3px;padding:6px 16px;background:#fff;border:1.5px solid var(--teal-light);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--teal-dark)">'+n+'</button>';
          }).join('');
        window._wb=wb;
        status.textContent='請選擇工作表（找到 '+wb.SheetNames.length+' 個）';
        return;
      }
      processImportSheet(wb, wb.SheetNames[0]);
    }catch(err){
      status.textContent='❌ 讀取失敗：'+err.message;
      status.style.color='var(--red)';
    }
  };
  reader.readAsArrayBuffer(file);
}

function processImportSheet(wb, sheetName){
  var status = document.getElementById('import-status');
  var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:'', header:1});
  if(!rows.length){ status.textContent='❌ 工作表是空的'; return; }

  // Auto-detect format
  var headers = rows[0].map(function(h){ return String(h||'').trim(); });
  var isVertical = headers.some(function(h){ return h.includes('組別') || h.includes('指標項目'); });

  if(isVertical){
    processVerticalFormat(rows, headers, status);
  } else {
    processHorizontalFormat(wb.Sheets[sheetName], status);
  }
}

// 直表格式：每列是一個年份×指標的組合
function processVerticalFormat(rows, headers, status){
  var COL = {};
  headers.forEach(function(h,i){
    var hc = h.replace(/\s/g,'');
    if(hc.includes('年份')||hc.includes('年度')) COL.year=i;
    else if(hc.includes('組別')) COL.group=i;
    else if(hc.includes('指標')||hc.includes('項目')) COL.item=i;
    else if(hc.includes('癌別')) COL.cancer=i;
    else if(hc.includes('閾值')) COL.threshold=i;
    else if(hc.includes('執行')||hc.includes('成果')||hc.includes('結果')) COL.result=i;
    else if(hc.includes('分子')) COL.num=i;
    else if(hc.includes('分母')) COL.den=i;
    else if(hc.includes('分析')||hc.includes('改善')) COL.analysis=i;
  });

  var GROUP_MAP = {
    '抗癌藥物安全組':'g1','影像診斷品質提升組':'g2',
    '社區篩檢發展推動組':'g3','安寧療護推動組':'g4',
    '營養衛教組':'g5','社工服務組':'g6',
    '心理腫瘤醫療服務組':'g7','癌症多專科團隊暨個案管理組':'g8',
    '診斷期':'g8','治療期':'g9','計畫書':'g10',
    '非動態':'g11','動態核心':'g12','失聯率':'g13','留治率':'g14','完治率':'g15',
  };

  // Build pivot: (gid, item, cancer) -> {yearKey: {t,r,frac,analysis}}
  var pivot = {};
  var yearsFound = {};

  for(var ri=1; ri<rows.length; ri++){
    var r = rows[ri];
    var yr  = String(r[COL.year ]||'').trim();
    var grp = String(r[COL.group]||'').trim();
    var itm = String(r[COL.item ]||'').trim();
    var can = String(r[COL.cancer||0]||'').trim();
    if(!yr||!grp) continue;

    var gid = GROUP_MAP[grp] || '';
    if(!gid){
      // fuzzy match
      Object.keys(GROUP_MAP).forEach(function(k){ if(grp.includes(k)||k.includes(grp)) gid=GROUP_MAP[k]; });
    }
    if(!gid) continue;

    var ynum = yr.replace(/[^0-9]/g,'');
    yearsFound[ynum] = yr;

    var t = fmtPct(r[COL.threshold]);
    var res = fmtPct(r[COL.result]);
    var fr = fmtFrac(r[COL.num], r[COL.den]);
    var ana = String(r[COL.analysis]||'').trim();

    var key = gid+'||'+itm+'||'+can;
    if(!pivot[key]) pivot[key]={gid:gid,item:itm,cancer:can,years:{}};
    pivot[key].years[ynum] = {t:t, r:res, frac:fr, analysis:ana};
  }

  var yearNums = Object.keys(yearsFound).sort();
  applyPivotToGroups(pivot, yearNums, status);
}

function fmtPct(v){
  if(v===undefined||v===null||v==='') return '';
  var s = String(v).trim();
  if(!s||s==='-'||s==='—') return '';
  try{
    var f=parseFloat(s);
    if(isNaN(f)) return s;
    if(f>0&&f<=1) return (f*100).toFixed(1).replace('.0','')+'%';
    return Number.isInteger(f)?f+'%':f.toFixed(1)+'%';
  }catch(e){ return s; }
}

function fmtFrac(n, d){
  try{
    var ni=parseInt(parseFloat(String(n||'').trim()));
    var di=parseInt(parseFloat(String(d||'').trim()));
    if(isNaN(ni)||isNaN(di)) return '';
    return ni+'/'+di;
  }catch(e){ return ''; }
}

function applyPivotToGroups(pivot, yearNums, status){
  var d = getEditData();
  var updated = 0;
  var notMatched = 0;

  d.forEach(function(g){
    g.indicators.forEach(function(ind){
      var gid = ind.id.split('-')[0];
      // Try to match by cancer
      var bestKey = null;
      Object.keys(pivot).forEach(function(k){
        var p = pivot[k];
        if(p.gid !== gid) return;
        var cn = (ind.cancer||'').replace(/\s/g,'');
        var pn = (p.cancer||'').replace(/\s/g,'');
        if(cn && pn && (cn===pn || cn.includes(pn) || pn.includes(cn))) bestKey = k;
      });

      if(!bestKey){
        notMatched++;
        return;
      }

      var p = pivot[bestKey];
      // Map year numbers to field names
      yearNums.forEach(function(ynum){
        var d2 = p.years[ynum];
        if(!d2) return;
        ind['t'+ynum] = d2.t || ind['t'+ynum] || '';
        ind['r'+ynum] = d2.r || ind['r'+ynum] || '';
        ind['frac'+ynum] = d2.frac || ind['frac'+ynum] || '';
        if(d2.analysis && ynum==='114') ind.analysis = d2.analysis;
      });
      updated++;
    });
  });

  EDIT_DATA = d;
  localStorage.setItem('edit_groups', JSON.stringify(d));
  if(state.role) state.groups = getGroups();
  if(state.groups && state.groups.length) renderSurvey();
  renderEditTab();

  var msg = '✅ 更新完成！'+updated+' 個指標已更新（年份：'+yearNums.join('、')+'）';
  if(notMatched) msg += '，'+notMatched+' 個未匹配（可在後台手動編輯）';
  status.textContent = msg;
  status.style.color = 'var(--green)';
}

// 橫表格式 fallback
function processHorizontalFormat(ws, status){
  var rows = XLSX.utils.sheet_to_json(ws, {defval:''});
  if(!rows.length){ status.textContent='❌ 工作表是空的'; return; }
  var headers = Object.keys(rows[0]);
  var MAP = autoDetectCols(headers);
  var d = getEditData();
  var updated = 0;
  rows.forEach(function(r){
    var gid = MAP.group_id?String(r[MAP.group_id]||'').trim():'';
    if(!gid) return;
    var grp = d.find(function(g){ return g.id===gid; });
    if(!grp) return;
    var no = MAP.no?String(r[MAP.no]||'').trim():'';
    var cancer = MAP.cancer?String(r[MAP.cancer]||'').trim():'';
    var ind = grp.indicators.find(function(i){ return i.no===no||(cancer&&i.cancer===cancer); });
    if(!ind) return;
    ['t112','r112','frac112','t113','r113','frac113','t114','r114','frac114','t115','missed','adj','basis','reason','analysis'].forEach(function(k){
      if(MAP[k] && r[MAP[k]]!==undefined && r[MAP[k]]!=='') ind[k]=String(r[MAP[k]]).trim();
    });
    updated++;
  });
  EDIT_DATA = d;
  localStorage.setItem('edit_groups', JSON.stringify(d));
  if(state.role) state.groups = getGroups();
  if(state.groups && state.groups.length) renderSurvey();
  renderEditTab();
  status.textContent='✅ 更新完成！'+updated+' 筆指標已更新';
  status.style.color='var(--green)';
}

function autoDetectCols(headers){
  var MAP={};
  var aliases={
    group_id:['group_id','群組','小組代碼','功能小組id','gid'],
    no:['no','編號','序號','指標編號'],
    cancer:['cancer','癌別','病別'],
    name:['name','指標名稱','名稱','監測項目'],
    t112:['t112','112閾值','112年閾值'],
    r112:['r112','112結果','112年結果','112執行結果'],
    frac112:['frac112','112分子分母','112年分子'],
    t113:['t113','113閾值','113年閾值'],
    r113:['r113','113結果','113年結果'],
    frac113:['frac113','113分子分母'],
    t114:['t114','114閾值','114年閾值'],
    r114:['r114','114結果','114年結果'],
    frac114:['frac114','114分子分母'],
    t115:['t115','115閾值','115年閾值','目標閾值','next'],
    missed:['missed','未達年度','未達標年度'],
    adj:['adj','調整方向','adjustment'],
    basis:['basis','設定依據','依據'],
    reason:['reason','調整原因','原因'],
    analysis:['analysis','分析改善','未達閾值分析'],
  };
  headers.forEach(function(h){
    var hc=h.toLowerCase().replace(/[\s_\-\/]/g,'');
    Object.keys(aliases).forEach(function(key){
      if(MAP[key]) return;
      aliases[key].forEach(function(alias){
        var ac=alias.toLowerCase().replace(/[\s_\-\/]/g,'');
        if(hc===ac||hc.includes(ac)||ac.includes(hc)) MAP[key]=h;
      });
    });
  });
  return MAP;
}

  h += "<p style=\"color:#6B7280;font-size:13px\">勾選要派給委員的指標 → 選擇委員姓名 → 按產生問卷</p></div>";

  // Toolbar
  h += "<div style=\"background:#fff;border:1px solid #D1D5DB;border-radius:10px;padding:14px 20px;";
  h += "margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\">";
  h += "<button onclick=\"dispatchCheckAll(true)\" style=\"padding:6px 14px;background:#EDF6F7;border:1.5px solid #83C5BE;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;color:#004E56\">☑ 全選</button>";
  h += "<button onclick=\"dispatchCheckAll(false)\" style=\"padding:6px 14px;background:#F3F4F6;border:1.5px solid #D1D5DB;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer\">☐ 全不選</button>";
  h += "<div style=\"flex:1\"></div>";
  h += "<span style=\"font-size:13px;color:#6B7280\">派送給：</span>";
  h += "<select id=\"dp-member\" style=\"padding:7px 12px;border:1.5px solid #D1D5DB;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit\"><option value=\"\">— 選擇委員 —</option>";
  DISPATCH_MEMBERS.forEach(function(m) { h += "<option value=\"" + m + "\">" + m + "</option>"; });
  h += "</select>";
  h += "<button onclick=\"dispatchGenerate()\" style=\"padding:8px 22px;background:#006D77;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\">📤 產生問卷</button>";
  h += "<span id=\"dp-status\" style=\"font-size:13px;color:#1E7C5A;min-width:80px\"></span>";
  h += "</div>";

  // Assignment summary
  var counted = {};
  Object.values(asgn).forEach(function(m) { counted[m] = (counted[m] || 0) + 1; });
  var hasSummary = Object.keys(counted).length > 0;
  if (hasSummary) {
    h += "<div style=\"display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap\">";
    Object.keys(counted).forEach(function(m) {
      h += "<span style=\"background:#EDF6F7;border:1px solid #83C5BE;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:#004E56\">" + m + "：" + counted[m] + " 項";
      h += " <button onclick=\"dispatchReDownload('" + m + "')\" style=\"background:none;border:none;color:#006D77;cursor:pointer;font-size:11px;text-decoration:underline\">重新下載</button>";
      h += "</span>";
    });
    h += "<button onclick=\"dispatchClear()\" style=\"padding:3px 10px;background:#fff;border:1.5px solid #C8963E;border-radius:6px;font-size:11px;cursor:pointer;color:#B45309;margin-left:auto\">清除記錄</button>";
    h += "</div>";
  }

  // Groups + indicators
  data.forEach(function(g) {
    if (!g.indicators || !g.indicators.length) return;
    h += "<div style=\"background:#fff;border:1px solid #D1D5DB;border-radius:10px;margin-bottom:12px;overflow:hidden\">";
    h += "<div style=\"background:#006D77;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px\">";
    h += "<input type=\"checkbox\" id=\"dg-" + g.id + "\" onchange=\"dispatchGroupCheck('" + g.id + "',this.checked)\" style=\"width:16px;height:16px;cursor:pointer\">";
    h += "<span style=\"font-size:14px;font-weight:700\">" + g.name + "</span>";
    h += "<span style=\"opacity:.8;font-size:12px\">（" + g.indicators.length + " 項）</span>";
    h += "</div><div>";
    g.indicators.forEach(function(ind) {
      var who = asgn[ind.id] || "";
      h += "<label style=\"display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;border-bottom:1px solid #F3F4F6;background:" + (who ? "#F0FDF4" : "#fff") + "\">";
      h += "<input type=\"checkbox\" class=\"dp-chk\" data-id=\"" + ind.id + "\" data-gid=\"" + g.id + "\" style=\"width:16px;height:16px;cursor:pointer\">";
      h += "<span style=\"background:#006D77;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;flex-shrink:0\">" + ind.no + "</span>";
      h += "<span style=\"font-size:13px;font-weight:600;flex:1\">" + (ind.cancer ? ind.cancer + " — " : "") + ind.name.substring(0, 45) + "</span>";
      if (who) h += "<span style=\"background:#D1FAE5;color:#065F46;font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;flex-shrink:0\">✓ " + who + "</span>";
      h += "</label>";
    });
    h += "</div></div>";
  });

  document.getElementById("admin-tab-dispatch").innerHTML = h;
}

function dispatchCheckAll(val) {
  document.querySelectorAll(".dp-chk").forEach(function(cb) { cb.checked = val; });
  document.querySelectorAll("[id^=dg-]").forEach(function(cb) { cb.checked = val; });
}

function dispatchGroupCheck(gid, val) {
  document.querySelectorAll(".dp-chk[data-gid=" + gid + "]").forEach(function(cb) { cb.checked = val; });
}

function dispatchGenerate() {
  var member = document.getElementById("dp-member").value;
  if (!member) { alert("請先選擇委員"); return; }
  var ids = [];
  document.querySelectorAll(".dp-chk:checked").forEach(function(cb) { ids.push(cb.getAttribute("data-id")); });
  if (!ids.length) { alert("請先勾選至少一個指標"); return; }

  var asgn = {};
  try { asgn = JSON.parse(localStorage.getItem("dispatch_assignments") || "{}"); } catch(e){}
  ids.forEach(function(id) { asgn[id] = member; });
  localStorage.setItem("dispatch_assignments", JSON.stringify(asgn));

  dispatchBuildHTML(member, ids);
  renderDispatchTab();
}

function dispatchBuildHTML(member, ids) {
  var status = document.getElementById("dp-status");
  if (status) { status.textContent = "⏳ 產生中…"; status.style.color = "#C8963E"; }

  // Use setTimeout to let UI update before heavy work
  setTimeout(function() {
    try {
      var data;
      if (typeof EDIT_DATA !== "undefined" && EDIT_DATA) data = EDIT_DATA;
      else if (typeof _bakedGroups !== "undefined" && _bakedGroups) data = _bakedGroups;
      else data = GROUPS;

      var links = {};
      try { links = JSON.parse(localStorage.getItem("admin_links") || "{}"); } catch(e){}
      Object.assign(links, MEETING_LINKS);

      var filteredGroups = [];
      data.forEach(function(g) {
        var fi = g.indicators.filter(function(ind) { return ids.indexOf(ind.id) > -1; });
        if (fi.length) {
          var gc = JSON.parse(JSON.stringify(g));
          gc.indicators = fi;
          gc.total = fi.length;
          filteredGroups.push(gc);
        }
      });

      if (!filteredGroups.length) { 
        alert("找不到對應指標"); 
        if (status) status.textContent = "❌ 找不到指標";
        return; 
      }

      var html = document.documentElement.outerHTML;
      html = html.replace(/var MEETING_LINKS[\s\S]*?= \{[^;]*\};/, "var MEETING_LINKS = " + JSON.stringify(links) + ";");
      html = html.replace("// _bakedGroups already declared above", "var _bakedGroups = " + JSON.stringify(filteredGroups) + ";");

      var blob = new Blob([html], { type: "text/html;charset=utf-8" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      var dt = new Date().toISOString().slice(5,10).replace("-", "月") + "日";
      a.download = "問卷_" + member + "_" + ids.length + "項_" + dt + ".html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(a.href); }, 5000);

      if (status) { 
        status.textContent = "✅ 已下載！請到下載資料夾取檔"; 
        status.style.color = "#1E7C5A";
        setTimeout(function() { status.textContent = ""; }, 5000); 
      }
    } catch(err) {
      if (status) { status.textContent = "❌ 錯誤：" + err.message; status.style.color = "#C0392B"; }
      console.error("dispatchBuildHTML error:", err);
    }
  }, 100);
}

function dispatchReDownload(member) {
  var asgn = {};
  try { asgn = JSON.parse(localStorage.getItem("dispatch_assignments") || "{}"); } catch(e){}
  var ids = Object.keys(asgn).filter(function(k) { return asgn[k] === member; });
  if (ids.length) dispatchBuildHTML(member, ids);
}

function dispatchClear() {
  if (confirm("確定清除所有派送記錄？")) {
    localStorage.removeItem("dispatch_assignments");
    renderDispatchTab();
  }
}

// init
(()=>{
  var _eg=localStorage.getItem('edit_groups');
  if(_eg){try{EDIT_DATA=JSON.parse(_eg);}catch(e){}}
  var _s=JSON.parse(localStorage.getItem('admin_links')||'{}');
  Object.assign(state.adminLinks,_s); Object.assign(MEETING_LINKS,_s);
  if(typeof _sheetUrl!=='undefined'&&_sheetUrl)localStorage.setItem('sheet_url',_sheetUrl);
  loadMeetingLinks();
  // Auto-start if dispatched
  if(typeof _bakedGroups!=='undefined'&&_bakedGroups&&_bakedGroups.length>0&&
     typeof _presetMember!=='undefined'&&_presetMember){
    state.name=_presetMember; state.role='medical'; startSurvey();
  }
})();

// Live-sync meeting links from admin localStorage
window.addEventListener('storage', function(e){
  if(e.key === 'adm_meeting_links'){
    if(typeof renderSurvey === 'function') renderSurvey();
  }
});

</script>
